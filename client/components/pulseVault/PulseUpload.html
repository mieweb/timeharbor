<template name="pulseUploadModal">
  <dialog id="pulseUploadModal" class="modal">
    <div class="modal-box bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl shadow-xl max-w-md">
      <!-- Header -->
      <div class="flex justify-between items-start gap-2">
        <h3 class="font-bold text-lg text-gray-900 dark:text-white flex items-center gap-2">
          {{> pulseVaultIcon class="w-6 h-6 text-purple-600 dark:text-purple-400"}}
          <span>Upload with PulseCam</span>
        </h3>
        <button type="button" class="close-pulse-upload-modal p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shrink-0" aria-label="Close">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <p class="text-gray-500 dark:text-gray-400 mt-1 mb-4 text-sm">
        {{#if pulseUploadTicketTitle}}Attach media to: <span class="font-medium text-gray-700 dark:text-gray-300">{{pulseUploadTicketTitle}}</span>{{else}}Attach media to this session{{/if}}
      </p>

      {{#if pulseUploadLoading}}
        <!-- Loading state -->
        <div class="flex flex-col items-center justify-center py-8">
          <div class="w-12 h-12 border-4 border-purple-200 dark:border-purple-800 border-t-purple-600 dark:border-t-purple-400 rounded-full animate-spin"></div>
          <p class="mt-4 text-gray-600 dark:text-gray-400 text-sm">Generating upload link...</p>
        </div>
      {{else}}
        {{#if pulseUploadError}}
          <!-- Error state -->
          <div class="py-6 text-center">
            <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center">
              <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <p class="text-red-600 dark:text-red-400 font-medium">{{pulseUploadError}}</p>
            <button type="button" class="retry-pulse-upload mt-4 px-4 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-sm font-medium">
              Try Again
            </button>
          </div>
        {{else}}
          {{#if pulseUploadData}}
            <!-- Success state - show QR or deep link -->
            <div class="space-y-4">
              <!-- Desktop: QR Code -->
              <div class="hidden md:block">
                <p class="text-center text-gray-600 dark:text-gray-400 text-sm mb-3">
                  Scan with PulseCam app to upload photos/videos
                </p>
                <div id="pulseQrCodeContainer" class="flex justify-center p-4 bg-white rounded-xl border border-gray-200 dark:border-gray-600">
                  <!-- QR code will be rendered here by JavaScript -->
                  <div id="pulseQrCode" class="w-48 h-48 flex items-center justify-center"></div>
                </div>
                <p class="text-center text-xs text-gray-500 dark:text-gray-500 mt-2">
                  This QR code is permanently linked to this ticket
                </p>
              </div>

              <!-- Mobile: Deep link button -->
              <div class="md:hidden">
                <p class="text-center text-gray-600 dark:text-gray-400 text-sm mb-4">
                  Tap the button below to open PulseCam and upload media
                </p>
                <a href="{{pulseUploadData.deeplink}}" class="flex items-center justify-center gap-2 w-full px-4 py-3 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-colors shadow-sm font-medium text-base" aria-label="Open PulseCam app">
                  {{> cameraIcon class="w-5 h-5"}}
                  <span>Open PulseCam App</span>
                </a>
                <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-3">
                  Don't have PulseCam? <a href="https://apps.apple.com/us/app/pulse-cam/id6748621024" target="_blank" rel="noopener noreferrer" class="text-purple-600 dark:text-purple-400 hover:underline">Download</a>
                </p>
              </div>

              <!-- Draft info -->
              <div class="pt-4 border-t border-gray-100 dark:border-gray-700">
                <p class="text-xs text-gray-500 dark:text-gray-500 text-center">
                  Draft ID: <code class="font-mono bg-gray-100 dark:bg-gray-700 px-1 rounded">{{pulseUploadData.draftId}}</code>
                </p>
              </div>
            </div>
          {{/if}}
        {{/if}}
      {{/if}}

      <!-- Footer -->
      <div class="flex justify-end mt-6">
        <button type="button" class="close-pulse-upload-modal px-4 py-2 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-sm">
          Close
        </button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button type="button" class="close-pulse-upload-modal">close</button>
    </form>
  </dialog>
</template>
